<svg xmlns="http://www.w3.org/2000/svg" width="1920" height="1080" viewBox="0 0 1920 1080">
  <defs>
    <style>
      .bg { fill: #0f2238; }
      .frame { fill: none; stroke: #f7d8b5; stroke-width: 6; }
      .safe { fill: none; stroke: #d67a45; stroke-width: 4; stroke-dasharray: 14 10; }
      .txt { fill: #f7d8b5; font-family: Arial, sans-serif; font-size: 36px; font-weight: 700; }
      .sub { fill: #f7d8b5; font-family: Arial, sans-serif; font-size: 22px; }
      .note { fill: #d67a45; font-family: Arial, sans-serif; font-size: 20px; }
    </style>
  </defs>

  <rect class="bg" x="0" y="0" width="1920" height="1080" />
  <rect class="frame" x="3" y="3" width="1914" height="1074" />

  <!-- Safe content area -->
  <rect class="safe" x="120" y="80" width="1680" height="920" />

  <text class="txt" x="70" y="70">FOGATTA - Fondo Desktop</text>
  <text class="sub" x="70" y="108">1920 x 1080 px (16:9)</text>
  <text class="note" x="130" y="965">Zona segura sugerida: 1680 x 920 (margen 120 horizontal, 80 vertical)</text>
  <text class="note" x="130" y="995">Evita poner texto o logos importantes fuera de la zona segura.</text>
</svg>

